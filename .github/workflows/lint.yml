name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Go 環境セットアップ
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      # buf セットアップ
      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.34.0"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: go mod tidy
        run: make tidy-check

      # Go の Lint
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.1
          args: --timeout=5m
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # buf lint
      - name: Run buf lint
        run: make lint

      - name: Run buf format (check)
        run: make format-check

      # buf breaking (後方互換性チェック)
      - name: Run buf breaking
        run: make breaking

      - name: Run buf generate (check)
        run: make generate-check
