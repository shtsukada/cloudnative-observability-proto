name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Go 環境セットアップ
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      # buf セットアップ
      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.34.0

      # Go モジュール依存解決
      - name: Install dependencies
        run: go mod tidy

      # Go の Lint
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      # buf lint
      - name: Run buf lint
        run: buf lint

      # buf breaking (後方互換性チェック)
      - name: Run buf breaking
        run: buf breaking --against '.git#branch=main'
